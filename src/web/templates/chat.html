<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Interview Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="instructions-panel" id="instructions-panel">
            <h3>📋 Interview Instructions</h3>
            <ul>
                <li><strong>Type</strong> your responses in the text box below</li>
                <li>Start a cultural conversation about <strong>{{topic}} in {{country}}</strong></li>
                <li>Continue until you are informed that the session has ended</li>
            </ul>
        </div>

        <div id="status"></div>

        <div id="chat-box">
            <!-- Messages will appear here -->
        </div>

        <form id="chat-form">
            <textarea id="chat-input" placeholder="Type your message..." required></textarea>
            <button type="submit" class="chat-send">➤</button>
        </form>
    </div>

    <script>
        // ===================================================================
        // STATE VARIABLES
        // ===================================================================
        let sessionToken        = null;
        let sessionStartTime    = null;
        let seenMessageIds      = new Set();
        let isSessionCompleted  = false;
        let pollingInterval     = null;
        let lastLikedMessageText    = null;
        let lastRejectedOptions     = [];
        let lastRejectedMessageIds  = [];
        let openingSelected     = true;   // always true — no opening picker in assigned sessions
        let lastChosenTopic     = null;
        let lastChosenCountry   = null;
        let lastRatingCultural  = null;
        let lastRatingFluency   = null;
        let pendingLikeCount    = 0;
        let assignedSessionId   = null;
        let assignedNTurns      = null;

        // ===================================================================
        // UTILITY FUNCTIONS
        // ===================================================================
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setChatInputsLocked(locked, reason) {
            if (isSessionCompleted) return;
            const input   = document.getElementById('chat-input');
            const sendBtn = document.querySelector('#chat-form button[type="submit"]');
            input.disabled   = locked;
            sendBtn.disabled = locked;
            if (locked) {
                input.classList.add('awaiting-like');
                input.placeholder = reason || '⭐ Rate the response above before continuing…';
            } else {
                input.classList.remove('awaiting-like');
                input.placeholder = 'Type your message...';
            }
        }

        function refreshLikeLock() {
            setChatInputsLocked(pendingLikeCount > 0);
        }

        function disableChatInputs() {
            const input   = document.getElementById('chat-input');
            const sendBtn = document.querySelector('#chat-form button[type="submit"]');
            input.disabled    = true;
            input.placeholder = "Session has ended";
            sendBtn.disabled  = true;
            input.classList.remove('awaiting-like');
            document.querySelector('.chat-container').classList.add('session-ended');
            document.getElementById('chat-form').onsubmit = e => { e.preventDefault(); return false; };
        }

        // ===================================================================
        // RATING FORM BUILDER
        // ===================================================================
        function buildRatingForm(msgDiv, messageId) {
            return new Promise((resolve) => {
                const uid = messageId.replace(/[^a-zA-Z0-9]/g, '_');
                const form = document.createElement('div');
                form.className = 'rating-form';
                form.innerHTML = `
                    <p>Rate this response</p>
                    <div class="rating-row">
                        <label>Cultural correctness</label>
                        <div class="star-group" id="cultural-stars-${uid}">
                            <input type="radio" name="cultural_${uid}" id="c5_${uid}" value="5"><label for="c5_${uid}">★</label>
                            <input type="radio" name="cultural_${uid}" id="c4_${uid}" value="4"><label for="c4_${uid}">★</label>
                            <input type="radio" name="cultural_${uid}" id="c3_${uid}" value="3"><label for="c3_${uid}">★</label>
                            <input type="radio" name="cultural_${uid}" id="c2_${uid}" value="2"><label for="c2_${uid}">★</label>
                            <input type="radio" name="cultural_${uid}" id="c1_${uid}" value="1"><label for="c1_${uid}">★</label>
                        </div>
                    </div>
                    <div class="rating-row">
                        <label>Fluency</label>
                        <div class="star-group" id="fluency-stars-${uid}">
                            <input type="radio" name="fluency_${uid}" id="f5_${uid}" value="5"><label for="f5_${uid}">★</label>
                            <input type="radio" name="fluency_${uid}" id="f4_${uid}" value="4"><label for="f4_${uid}">★</label>
                            <input type="radio" name="fluency_${uid}" id="f3_${uid}" value="3"><label for="f3_${uid}">★</label>
                            <input type="radio" name="fluency_${uid}" id="f2_${uid}" value="2"><label for="f2_${uid}">★</label>
                            <input type="radio" name="fluency_${uid}" id="f1_${uid}" value="1"><label for="f1_${uid}">★</label>
                        </div>
                    </div>
                    <button class="rating-submit-btn" type="button" disabled>Submit rating</button>
                `;
                msgDiv.appendChild(form);
                scrollToBottom();

                const submitBtn = form.querySelector('.rating-submit-btn');
                function checkReady() {
                    const hasCultural = form.querySelector(`input[name="cultural_${uid}"]:checked`);
                    const hasFluency  = form.querySelector(`input[name="fluency_${uid}"]:checked`);
                    submitBtn.disabled = !(hasCultural && hasFluency);
                }
                form.querySelectorAll('input[type="radio"]').forEach(r => r.addEventListener('change', checkReady));

                submitBtn.addEventListener('click', async () => {
                    const cultural = parseInt(form.querySelector(`input[name="cultural_${uid}"]:checked`).value, 10);
                    const fluency  = parseInt(form.querySelector(`input[name="fluency_${uid}"]:checked`).value, 10);
                    lastRatingCultural = cultural;
                    lastRatingFluency  = fluency;
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting…';

                    let systemMessage = null;
                    try {
                        const resp = await fetch('/api/submit-rating', {
                            method:  'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                session_token:        sessionToken,
                                message_id:           messageId,
                                reply_to:             lastLikedMessageText,
                                rejected_options:     lastRejectedOptions,
                                rejected_message_ids: lastRejectedMessageIds,
                                rating_cultural:      cultural,
                                rating_fluency:       fluency,
                            }),
                        });
                        const result = await resp.json();
                        if (result.success && result.system_message) systemMessage = result.system_message;
                    } catch (err) {
                        console.warn('Rating submission error:', err);
                    }

                    form.innerHTML = `<span class="rating-done-badge">✓ Rated — cultural: ${cultural}/5 · fluency: ${fluency}/5</span>`;
                    if (systemMessage) appendSystemMessage(systemMessage);
                    resolve({ cultural, fluency });
                });
            });
        }

        // ===================================================================
        // MESSAGE RENDERING
        // ===================================================================
        function appendMessage(role, text, messageId) {
            if (messageId && seenMessageIds.has(messageId)) return false;
            if (messageId) seenMessageIds.add(messageId);

            const chatBox   = document.getElementById('chat-box');
            const className = role;
            const imgUrl    = (role === 'user' || role === 'User')
                ? "https://e7.pngegg.com/pngimages/178/595/png-clipart-user-profile-computer-icons-login-user-avatars-monochrome-black-thumbnail.png"
                : "https://uploads-ssl.webflow.com/64e02bd14ada8a57fa327cbe/64e445ced8cf185ffb9bb1b9_Rex%20Small_.png";

            if (className === 'user') {
                chatBox.innerHTML += `
                    <div class="message ${className}" data-msg-id="${messageId || ''}">
                    <img src="${imgUrl}" alt="${role}">
                    <p>${text.replace(/\n/g, '<br>')}</p>
                    </div>`;
            } else if (className === 'system') {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message system';
                msgDiv.dataset.msgId = messageId || '';
                msgDiv.innerHTML = `<span class="system-icon">💡</span><span>${text.replace(/\n/g, '<br>')}</span>`;
                chatBox.appendChild(msgDiv);
            } else {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${className}`;
                msgDiv.dataset.msgId = messageId || '';
                msgDiv.innerHTML = `
                    <img src="${imgUrl}" alt="${role}">
                    <p>${text.replace(/\n/g, '<br>')}</p>
                    <button class="like-btn" type="button">👍 Like</button>`;

                pendingLikeCount++;
                refreshLikeLock();

                const likeBtn = msgDiv.querySelector('.like-btn');
                likeBtn.addEventListener('click', async () => {
                    const prefix = messageId.substring(0, messageId.lastIndexOf('|'));
                    const textParagraph = msgDiv.querySelector('p');
                    lastLikedMessageText   = textParagraph ? textParagraph.innerText : null;
                    lastRejectedOptions    = [];
                    lastRejectedMessageIds = [];

                    document.querySelectorAll('#chat-box .message[data-msg-id]').forEach(el => {
                        const elId = el.dataset.msgId;
                        if (elId !== messageId && elId.startsWith(prefix)) {
                            const siblingText = el.querySelector('p');
                            if (siblingText) lastRejectedOptions.push(siblingText.innerText);
                            lastRejectedMessageIds.push(elId);
                            if (el.querySelector('.like-btn')) pendingLikeCount--;
                            el.remove();
                        }
                    });

                    likeBtn.remove();
                    await buildRatingForm(msgDiv, messageId);
                    pendingLikeCount--;
                    refreshLikeLock();
                });

                chatBox.appendChild(msgDiv);
            }

            scrollToBottom();
            return true;
        }

        function appendSystemMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = `<span class="system-icon">💡</span><span>${text.replace(/\n/g, '<br>')}</span>`;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        // ===================================================================
        // MESSAGE POLLING
        // ===================================================================
        async function markSessionCompleted() {
            try {
                await fetch('/api/mark-session-completed', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ session_id: assignedSessionId })
                });
            } catch (e) {
                console.error('Error marking session completed:', e);
            }
        }

        async function pollForMessages() {
            if (!sessionToken) return;
            try {
                const response = await fetch(`/api/get-messages?session_token=${sessionToken}`);
                if (response.status === 400) {
                    sessionToken = null;
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    return;
                }

                const data = await response.json();
                if (data.success && data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.role === 'Interviewer' || msg.role === 'assistant') {
                            appendMessage('bot', msg.content, msg.id);
                        } else if (msg.role === 'User' || msg.role === 'user') {
                            appendMessage('user', msg.content, msg.id);
                        } else if (msg.role === 'System' || msg.role === 'system') {
                            appendMessage('system', msg.content, msg.id);
                        }
                    });
                }

                if (data.session_completed) {
                    updateStatus('Session completed');
                    isSessionCompleted = true;
                    disableChatInputs();
                    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
                    await markSessionCompleted();
                    document.getElementById('status').innerHTML =
                        'Session completed! <a href="/" style="color:#2196F3;font-weight:600;">← Back to sessions</a>';
                }
            } catch (error) {
                console.error('Polling error', error);
            }
        }

        // ===================================================================
        // TEXT CHAT
        // ===================================================================
        document.getElementById('chat-form').onsubmit = async function(event) {
            event.preventDefault();
            if (isSessionCompleted) { updateStatus('Session has ended.'); return; }
            if (pendingLikeCount > 0) {
                updateStatus('⭐ Please rate the response above before continuing.');
                setTimeout(() => updateStatus(''), 2500);
                return;
            }
            if (!sessionToken) { updateStatus('Session not initialized yet. Please wait.'); return; }

            const input = document.getElementById('chat-input');
            const text  = input.value.trim();
            if (!text) return;

            input.value = '';
            appendMessage('user', text, 'user-' + Date.now());

            try {
                const response = await fetch('/api/send-message', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_token:    sessionToken,
                        message:          text,
                        type:             "CONVERSATION",
                        reply_to:         lastLikedMessageText,
                        rating_cultural:  lastRatingCultural,
                        rating_fluency:   lastRatingFluency,
                        rejected_options: lastRejectedOptions,
                        topic:            lastChosenTopic,
                        country:          lastChosenCountry,
                    }),
                });
                const result = await response.json();
                if (!result.success) {
                    console.error('Message send failed:', result);
                    if (result.session_completed) updateStatus('Session has ended');
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        };

        document.getElementById('chat-input').addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                document.getElementById('chat-form').dispatchEvent(new Event('submit'));
            }
        });

        // ===================================================================
        // INITIALIZATION
        // ===================================================================
        document.addEventListener('DOMContentLoaded', async function () {
            // Read params from Jinja2 template variables
            assignedSessionId = {{ session_id | tojson }};
            assignedNTurns    = {{ n_turns    | tojson }};
            lastChosenTopic   = {{ topic      | tojson }};
            lastChosenCountry = {{ country    | tojson }};

            updateStatus('Starting session…');
            try {
                const resp = await fetch('/api/start-session', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: assignedSessionId,
                        country:    lastChosenCountry,
                        topic:      lastChosenTopic,
                        n_turns:    assignedNTurns,
                    }),
                });
                const data = await resp.json();
                if (data.success) {
                    sessionToken     = data.session_token;
                    sessionStartTime = Date.now();
                    updateStatus(`Session ready — ${lastChosenTopic} · ${lastChosenCountry}`);
                    if (!pollingInterval) pollingInterval = setInterval(pollForMessages, 1500);
                    pollForMessages();
                } else {
                    updateStatus('Failed to start session: ' + (data.error || 'Unknown error'));
                    console.error('start-session failed:', data);
                }
            } catch (err) {
                updateStatus('Error starting session');
                console.error('Error starting session:', err);
            }
        });
    </script>
</body>
</html>
